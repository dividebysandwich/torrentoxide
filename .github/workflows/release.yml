name: release

# Builds standalone packages for Windows (zip + MSI), Linux (tar.gz + deb) and
# macOS (tar.gz, Intel + Apple Silicon) and attaches them to the GitHub release.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version for a manual build (e.g. v0.1.0)"
        required: false

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            rid: linux-x86_64
            target: x86_64-unknown-linux-gnu
            ext: ""
            deb_arch: amd64
          # 64-bit Raspberry Pi (Pi 3/4/5, Zero 2 W) — native arm64 build.
          # Built on 22.04 (glibc 2.35) for compatibility with Raspberry Pi OS Bookworm.
          - os: ubuntu-22.04-arm
            rid: linux-arm64
            target: aarch64-unknown-linux-gnu
            ext: ""
            deb_arch: arm64
          - os: windows-latest
            rid: windows-x86_64
            target: x86_64-pc-windows-msvc
            ext: ".exe"
          # One Apple Silicon runner produces a universal (Intel + ARM) binary via
          # lipo — GitHub's Intel `macos-13` runners are being retired.
          - os: macos-14
            rid: macos-universal
            target: aarch64-apple-darwin
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.rid }}

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-leptos
        shell: bash
        # --force so a stale "already installed" entry in cached ~/.cargo metadata
        # can't skip the install and leave the binary missing; then verify it runs.
        run: |
          cargo binstall -y --force cargo-leptos@0.3.2
          cargo leptos --version

      - name: Build (release)
        run: cargo leptos build --release

      # Make the macOS binary universal (arm64 + x86_64) so it runs on both Apple
      # Silicon and Intel Macs, using only the arm64 runner. Best-effort: if the
      # x86_64 cross-build fails, the arm64 binary is shipped as-is.
      - name: macOS universal binary
        if: runner.os == 'macOS'
        shell: bash
        run: |
          rustup target add x86_64-apple-darwin
          if cargo build --release --no-default-features --features ssr \
               --bin torrentoxide --target x86_64-apple-darwin; then
            lipo -create -output target/release/torrentoxide.uni \
              target/release/torrentoxide target/x86_64-apple-darwin/release/torrentoxide
            mv target/release/torrentoxide.uni target/release/torrentoxide
            echo "universal binary:"; lipo -info target/release/torrentoxide
          else
            echo "::warning::x86_64 cross-build failed — shipping arm64-only macOS binary"
          fi

      - name: Determine version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            V="${{ github.event.release.tag_name }}"
          else
            V="${{ github.event.inputs.version }}"
            [ -z "$V" ] && V="${{ github.ref_name }}"
          fi
          V="${V#v}"
          [ -z "$V" ] && V="0.0.0"
          echo "VERSION=$V" >> "$GITHUB_ENV"
          # MSI requires a strictly numeric x.y.z version
          NUM=$(printf '%s' "$V" | grep -oE '^[0-9]+(\.[0-9]+){0,2}' || true)
          [ -z "$NUM" ] && NUM="0.0.0"
          echo "MSI_VERSION=$NUM" >> "$GITHUB_ENV"

      - name: Stage package folder
        shell: bash
        run: |
          NAME="torrentoxide-${VERSION}-${{ matrix.rid }}"
          STAGE="dist/$NAME"
          echo "PKG_NAME=$NAME" >> "$GITHUB_ENV"
          echo "STAGE=$STAGE" >> "$GITHUB_ENV"
          mkdir -p "$STAGE/site"
          cp "target/release/torrentoxide${{ matrix.ext }}" "$STAGE/"
          cp -r target/site/. "$STAGE/site/"
          cp .env.example "$STAGE/" || true
          cp README.md "$STAGE/" || true
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp packaging/run.bat "$STAGE/"
          else
            cp packaging/run.sh "$STAGE/"
            chmod +x "$STAGE/run.sh" "$STAGE/torrentoxide"
          fi

      # ---- archives ----
      - name: Package tar.gz (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: tar -C dist -czf "dist/${PKG_NAME}.tar.gz" "${PKG_NAME}"

      - name: Package zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "dist/$env:PKG_NAME" -DestinationPath "dist/$env:PKG_NAME.zip"

      # ---- Linux .deb (x86_64 + arm64/Raspberry Pi) ----
      - name: Build .deb
        if: matrix.deb_arch != ''
        shell: bash
        run: bash packaging/build-deb.sh "$VERSION" "${{ matrix.deb_arch }}"

      # ---- Windows .msi (WiX v3: heat -> candle -> light) ----
      - name: Build .msi
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y
          $wixRoot = Get-ChildItem "C:\Program Files (x86)" -Directory -Filter "WiX Toolset*" `
            -ErrorAction SilentlyContinue | Sort-Object Name | Select-Object -Last 1
          if (-not $wixRoot) { throw "WiX Toolset not found after install" }
          $bin = Join-Path $wixRoot.FullName "bin"
          Copy-Item packaging/windows/TorrentOxide.cmd "$env:STAGE/TorrentOxide.cmd"
          New-Item -ItemType Directory -Force -Path obj | Out-Null
          & (Join-Path $bin "heat.exe") dir "$env:STAGE\site" -nologo -cg SiteFiles -dr SiteDir `
            -gg -g1 -sfrag -srd -sreg -var var.SiteDir -out obj\site.wxs
          & (Join-Path $bin "candle.exe") -nologo -arch x64 `
            -dVersion="$env:MSI_VERSION" -dStageDir="$env:STAGE" -dSiteDir="$env:STAGE\site" `
            packaging\windows\torrentoxide.wxs obj\site.wxs -out obj\
          & (Join-Path $bin "light.exe") -nologo -spdb -sval `
            obj\torrentoxide.wixobj obj\site.wixobj -out "dist\$env:PKG_NAME.msi"

      # ---- publish ----
      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.deb
            dist/*.msi
          if-no-files-found: ignore

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.deb
            dist/*.msi
